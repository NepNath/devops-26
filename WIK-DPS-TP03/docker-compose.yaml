services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: wik-dps-tp03-api:multi
    deploy:
      replicas: 4
    networks:
      - backend

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
